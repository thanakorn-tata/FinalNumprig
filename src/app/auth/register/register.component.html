<div class="flex min-h-screen">

  <!-- ซ้าย — ตกแต่ง -->
  <div class="relative items-center justify-center hidden overflow-hidden lg:flex lg:w-1/2 bg-gradient-to-br from-red-500 to-orange-400">
    <div class="absolute inset-0 opacity-10">
      <div class="absolute w-40 h-40 bg-white rounded-full top-10 left-10"></div>
      <div class="absolute bg-white rounded-full bottom-20 right-10 w-60 h-60"></div>
      <div class="absolute w-24 h-24 bg-white rounded-full top-1/2 left-1/3"></div>
    </div>
    <div class="relative px-12 text-center text-white">
      <div class="flex items-center justify-center w-24 h-24 mx-auto mb-6 rounded-full bg-white/20">
        <svg class="text-white w-14 h-14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
        </svg>
      </div>
      <h1 class="mb-3 text-4xl font-bold">น้ำพริกลูกทุ่งสุพรรณ</h1>
      <p class="text-lg text-white/80">สมัครสมาชิกเพื่อสั่งซื้อสินค้า</p>
    </div>
  </div>

  <!-- ขวา — ฟอร์ม -->
  <div class="flex items-center justify-center w-full px-6 py-12 lg:w-1/2 bg-gray-50">
    <div class="w-full max-w-md">

      <!-- Logo มือถือ -->
      <div class="mb-8 text-center lg:hidden">
        <div class="flex items-center justify-center w-16 h-16 mx-auto mb-3 shadow-lg bg-gradient-to-br from-red-500 to-orange-400 rounded-2xl">
          <svg class="text-white w-9 h-9" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
          </svg>
        </div>
        <h1 class="text-xl font-bold text-gray-800">น้ำพริกลูกทุ่งสุพรรณ</h1>
      </div>

      <!-- Card -->
      <div class="p-8 bg-white shadow-lg rounded-2xl">
        <div class="mb-8">
          <h2 class="text-2xl font-bold text-gray-800">สมัครสมาชิก</h2>
          <p class="mt-1 text-sm text-gray-500">สร้างบัญชีใหม่เพื่อเริ่มต้นช้อปปิ้ง</p>
        </div>

        <form (ngSubmit)="submit()" class="space-y-4">

          <!-- Fullname -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">ชื่อ - นามสกุล</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
              </div>
              <input type="text" [(ngModel)]="form.fullname" name="fullname" placeholder="ชื่อ-นามสกุล"
                class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent transition placeholder-gray-400" />
            </div>
          </div>

          <!-- Email -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">อีเมล</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                </svg>
              </div>
              <input type="email" [(ngModel)]="form.email" name="email" placeholder="example@email.com"
                class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent transition placeholder-gray-400" />
            </div>
          </div>

          <!-- Username -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">ชื่อผู้ใช้</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
              </div>
              <input type="text" [(ngModel)]="form.username" name="username" placeholder="กรอกชื่อผู้ใช้"
                class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent transition placeholder-gray-400" />
            </div>
          </div>

          <!-- Password -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">รหัสผ่าน</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
              </div>
              <input type="password" [(ngModel)]="form.password" name="password" placeholder="อย่างน้อย 8 ตัวอักษร"
                class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent transition placeholder-gray-400" />
            </div>
          </div>

          <!-- Success -->
          @if (success) {
            <div class="flex items-center gap-2 p-3 border border-green-200 bg-green-50 rounded-xl">
              <svg class="flex-shrink-0 w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
              </svg>
              <p class="text-sm text-green-700">{{ success }}</p>
            </div>
          }

          <!-- Error -->
          @if (error) {
            <div class="flex items-center gap-2 p-3 border border-red-200 bg-red-50 rounded-xl">
              <svg class="flex-shrink-0 w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              <p class="text-sm text-red-600">{{ error }}</p>
            </div>
          }

          <!-- ปุ่มสมัคร -->
          <button type="submit"
            class="w-full py-3 bg-gradient-to-r from-red-500 to-orange-500 text-white font-bold rounded-xl hover:from-red-600 hover:to-orange-600 transition shadow-md hover:shadow-lg transform hover:scale-[1.02] active:scale-[0.98]">
            สมัครสมาชิก
          </button>

        </form>

        <!-- Login link -->
        <p class="mt-6 text-sm text-center text-gray-500">
          มีบัญชีอยู่แล้ว?
          <a routerLink="/login" class="font-semibold text-red-500 transition hover:text-red-600">
            เข้าสู่ระบบ
          </a>
        </p>
      </div>

    </div>
  </div>

</div>

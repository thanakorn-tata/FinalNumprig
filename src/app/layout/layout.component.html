<div class="min-h-screen bg-gray-200">
  <header class="sticky top-0 z-30 bg-white border-b shadow-sm">
    <div class="max-w-6xl px-6 mx-auto">
      <div class="flex items-center justify-between h-16">

        <!-- Logo -->
        <a routerLink="/" class="flex items-center gap-2 text-xl font-bold text-red-600">
          น้ำพริกลูกทุ่งสุพรรณ
        </a>

        <!-- Nav -->
        <nav class="hidden gap-6 text-sm font-medium text-gray-700 md:flex">
          <a routerLink="/" class="transition hover:text-red-500">หน้าแรก</a>
          <a routerLink="/" class="transition hover:text-red-500">สินค้าทั้งหมด</a>
          @if (isAdmin) {
            <a routerLink="/admin" class="transition hover:text-red-500">Admin Panel</a>
          }
        </nav>

        <!-- Cart + User + Logout -->
        <div class="flex items-center gap-3">

          <!-- Cart Icon -->
          <button (click)="openCart()" class="relative p-2 transition rounded-lg hover:bg-gray-100">
            <svg class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
            </svg>
            @if (cartCount > 0) {
              <span class="absolute flex items-center justify-center w-5 h-5 text-xs font-bold text-white bg-red-500 rounded-full -top-1 -right-1">
                {{ cartCount > 99 ? '99+' : cartCount }}
              </span>
            }
          </button>

          <!-- ✅ User Avatar — คลิกไปหน้า Profile -->
          <a routerLink="/profile" class="flex items-center gap-2 transition hover:opacity-80">
            <div class="flex items-center justify-center w-8 h-8 text-sm font-semibold text-white bg-red-400 rounded-full">
              {{ username.charAt(0).toUpperCase() }}
            </div>
            <span class="hidden text-sm font-medium text-gray-700 sm:block">{{ username }}</span>
          </a>

          <!-- Logout -->
          <button (click)="logout()"
            class="flex items-center gap-1 px-3 py-1.5 text-sm text-gray-600 border border-gray-300 rounded-lg hover:bg-red-50 hover:text-red-600 hover:border-red-300 transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
            </svg>
            ออกจากระบบ
          </button>
        </div>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto bg-white">
    <router-outlet></router-outlet>
  </main>
</div>

<!-- Cart Drawer -->
<app-cart [isOpen]="isCartOpen" (closeCart)="closeCart()"></app-cart>

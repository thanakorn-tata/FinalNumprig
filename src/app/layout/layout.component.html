<div class="min-h-screen" style="background:#fff5f5;">

  <!-- ─── HEADER ─── -->
  <header class="sticky top-0 z-30 bg-white border-b shadow-sm" style="border-bottom-color:#fecaca;">
    <div class="max-w-6xl px-6 mx-auto">
      <div class="flex items-center justify-between h-16">

        <!-- Logo -->
        <a routerLink="/" class="flex items-center gap-2 group">
          <div class="flex items-center justify-center w-8 h-8 text-sm font-extrabold text-white transition rounded-lg group-hover:scale-105"
            style="background:linear-gradient(135deg,#dc2626,#ea580c);">น</div>
          <span class="text-base font-extrabold tracking-tight" style="color:#dc2626;">
            น้ำพริกลูกทุ่งสุพรรณ
          </span>
        </a>

        <!-- Nav -->
        <nav class="hidden gap-1 md:flex">
          <a routerLink="/"
            class="px-3 py-2 text-sm font-semibold text-gray-600 transition rounded-lg hover:bg-red-50 hover:text-red-600">
            หน้าแรก
          </a>
          <!-- <a routerLink="/"
            class="px-3 py-2 text-sm font-semibold text-gray-600 transition rounded-lg hover:bg-red-50 hover:text-red-600">
            สินค้าทั้งหมด
          </a> -->
          @if (isAdmin) {
            <a routerLink="/admin"
              class="flex items-center gap-1.5 px-3 py-2 text-sm font-semibold rounded-lg transition"
              style="color:#dc2626;background:#fff1f2;">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              </svg>
              Admin Panel
            </a>
          }
        </nav>

        <!-- Right: Cart + User + Logout -->
        <div class="flex items-center gap-2">

          <!-- Cart -->
          <button (click)="openCart()"
            class="relative p-2 transition rounded-lg hover:bg-red-50 group">
            <svg class="w-5 h-5 text-gray-600 transition group-hover:text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
            </svg>
            @if (cartCount > 0) {
              <span class="absolute flex items-center justify-center w-4 h-4 text-xs font-extrabold text-white rounded-full -top-0.5 -right-0.5"
                style="background:linear-gradient(135deg,#dc2626,#ea580c);font-size:10px;">
                {{ cartCount > 99 ? '99+' : cartCount }}
              </span>
            }
          </button>

          <!-- divider -->
          <div class="w-px h-5 mx-1 bg-gray-200"></div>

          <!-- User Avatar -->
          <a routerLink="/profile" class="flex items-center gap-2 px-2 py-1.5 rounded-lg transition hover:bg-red-50 group">
            <div class="flex items-center justify-center flex-shrink-0 text-xs font-extrabold text-white rounded-full w-7 h-7"
              style="background:linear-gradient(135deg,#dc2626,#ea580c);">
              {{ username.charAt(0).toUpperCase() }}
            </div>
            <span class="hidden text-sm font-semibold text-gray-700 transition sm:block group-hover:text-red-600">
              {{ username }}
            </span>
          </a>

          <!-- Logout -->
          <button (click)="logout()"
            class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold rounded-lg border transition hover:scale-105"
            style="color:#dc2626;border-color:#fca5a5;background:#fff1f2;"
            onmouseenter="this.style.background='#fee2e2';this.style.borderColor='#dc2626';"
            onmouseleave="this.style.background='#fff1f2';this.style.borderColor='#fca5a5';">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
            </svg>
            ออกจากระบบ
          </button>

        </div>
      </div>
    </div>
  </header>

  <!-- ─── CONTENT ─── -->
  <main class="max-w-6xl mx-auto bg-white" style="box-shadow:0 4px 24px rgba(220,38,38,0.06);">
    <router-outlet></router-outlet>
  </main>

</div>

<!-- Cart Drawer -->
<app-cart [isOpen]="isCartOpen" (closeCart)="closeCart()"></app-cart>
